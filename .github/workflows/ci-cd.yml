name: FinTrack CI/CD

# ARCHITECTURE NOTE (see docs/adr/ADR-005-deployment-architecture.md):
# Repo is PUBLIC -> environment: production required reviewers works on the free plan.
# Railway is connected to GitHub directly -- it auto-builds apps/api from source on
# push to `staging`/`main`. No GHCR Docker push needed here; this workflow only
# builds and ships the frontend. Railway's own dashboard (one-time setup) owns the
# API build/deploy, not this file.
#
# build-frontend / deploy-frontend-* are guarded on whether apps/web exists yet
# (it doesn't -- only backend stories have shipped so far, FINTRACK-13). That
# check has to happen in its own job with a real checkout: a job-level `if:`
# is evaluated by the orchestrator before any runner/checkout exists for that
# job, so a filesystem-dependent function like hashFiles() isn't available
# there at all (this is what broke the first two attempts at this workflow --
# "Unrecognized function: hashFiles", not a YAML syntax problem). detect-frontend
# below does the actual checkout + shell test and exposes a plain string output,
# which downstream jobs can safely read in their own job-level `if:`.

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch: # manual trigger only used by generate-lock-file below (F-12)

jobs:
  # ─── STAGE 0: Detect whether a frontend exists yet ───────────────
  detect-frontend:
    name: Detect Frontend
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f "apps/web/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── STAGE 1: Security scan (all branches) ───────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1 # fails pipeline on any CRITICAL or HIGH CVE

  # ─── STAGE 2: Test suite (all branches) ──────────────────────────
  test:
    name: Test Suite
    needs: security-scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: test_password, POSTGRES_DB: fintrack_test }
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Verify requirements.lock.txt is current (F-12)
        # Regenerates a throwaway copy the same way generate-lock-file does and
        # diffs it against the committed lock file. Catches anyone editing
        # apps/api/requirements.txt or requirements-test.txt without also
        # regenerating+committing the lock file -- if this fails, run the
        # "Regenerate requirements.lock.txt (F-12, manual)" job and commit
        # the result.
        #
        # --no-header on both this and generate-lock-file's compile: pip-compile's
        # autogenerated header echoes back its own --output-file argument, which
        # necessarily differs between the committed file (requirements.lock.txt)
        # and this throwaway check copy (requirements.lock.txt.check) -- causing
        # a guaranteed one-line diff even when every dependency and hash matches.
        # Confirmed via the real CI log on 2026-07-21: the only diff was that
        # header line, nothing in the actual lock content. --no-header removes
        # the line entirely so the diff reflects real drift only.
        run: |
          pip install pip-tools
          pip-compile --generate-hashes --allow-unsafe --no-header \
            --output-file=requirements.lock.txt.check \
            apps/api/requirements.txt requirements-test.txt
          diff requirements.lock.txt requirements.lock.txt.check
      - name: Install dependencies (hash-pinned, F-12)
        # --require-hashes: pip refuses to install anything whose downloaded
        # file doesn't match the hash recorded here, catching a compromised
        # package/mirror even when the version number looks identical.
        run: pip install --require-hashes -r requirements.lock.txt
      - name: Run pytest with coverage
        env:
          # Not actually used by the current suite -- tests/unit, tests/security,
          # and tests/integration all run against an isolated in-memory SQLite DB
          # (see tests/conftest.py) regardless of DATABASE_URL, so results are
          # deterministic and don't depend on this service container. Kept wired
          # up for future stories whose integration tests may want a real Postgres
          # instance.
          DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost:5432/fintrack_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
          # Without this, `apps` isn't importable and every test module that
          # imports it at module level fails collection with
          # ModuleNotFoundError: No module named 'apps' -- this step never
          # actually ran in real CI until PR #2 (Security Scan always failed
          # first before that), so this gap went uncaught since Release Pro's
          # original workflow was authored. Found via the real CI log, 2026-07-04.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/unit tests/security tests/integration \
            --cov=apps.api \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml \
            -v
      - name: Upload test & coverage artifacts (F-10)
        # if: always() -- a failing/red run's evidence matters more, not less;
        # QA Lead's envelope should be able to cite this run whether it passed or not.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            test-results.xml
            coverage.xml
            htmlcov/
          retention-days: 30
      - name: Generate SBOM (F-12)
        # CycloneDX SBOM of everything checked out (repo deps, not just apps/api) --
        # syft parses the requirements files directly, no install/interpreter risk.
        # anchore/sbom-action auto-publishes output-file as a build artifact.
        if: always()
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

  # ─── MANUAL: regenerate hash-pinned dependency lock file (F-12) ──
  # Run manually from the Actions tab (workflow_dispatch) whenever
  # apps/api/requirements.txt or requirements-test.txt changes. Runs on
  # the same Python 3.12 the app and this CI's own `test` job use --
  # generating the lock file on a mismatched interpreter risks recording
  # hashes for wheels that aren't what 3.12 actually resolves (the same
  # class of mistake as the 2026-07-03 distroless incident, just for
  # pip wheels instead of a base image). Opens no PR by itself; commits
  # requirements.lock.txt straight to whichever branch triggered it --
  # review the diff before merging that branch.
  generate-lock-file:
    name: Regenerate requirements.lock.txt (F-12, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Compile hash-pinned lock file
        # --no-header: see the matching note on the Verify step above -- without
        # it, this file's header would embed --output-file=requirements.lock.txt,
        # which is fine here, but keeping both compiles header-free means neither
        # side of the drift-check ever disagrees over anything but real content.
        run: |
          pip-compile --generate-hashes --allow-unsafe --no-header \
            --output-file=requirements.lock.txt \
            apps/api/requirements.txt requirements-test.txt
      - name: Commit lock file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.lock.txt
          git diff --cached --quiet || git commit -m "chore(F-12): regenerate requirements.lock.txt"
          git push

  # ─── STAGE 3: Build frontend (staging + main only) ───────────────
  build-frontend:
    name: Build Frontend
    needs: [test, detect-frontend]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main') && needs.detect-frontend.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: apps/web/package-lock.json }
      - name: Install and build
        run: cd apps/web && npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }} # e.g. https://api.fintrack.yourdomain.com
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: apps/web/dist }

  # ─── STAGE 4a: Deploy to STAGING ─────────────────────────────────
  # Railway: auto-deploys apps/api from the staging branch (connected via Railway's
  # own GitHub integration -- not triggered from this workflow).
  # Frontend: FTP to Hostinger staging subdomain.
  deploy-frontend-staging:
    name: Deploy Frontend -> Staging (Hostinger)
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && needs.build-frontend.result == 'success'
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: dist }
      - name: FTP deploy to Hostinger staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          local-dir: dist/
          server-dir: /public_html/staging/ # staging subdomain folder

  # ─── STAGE 4b: Deploy to PRODUCTION ──────────────────────────────
  # environment: production -> GitHub pauses here and emails required reviewers.
  # Works on the free plan because the repo is public (see ADR-004 in the blueprint).
  # Human clicks "Approve" in the GitHub UI -> pipeline resumes.
  # Railway: auto-deploys apps/api from the main branch after merge (its own trigger).
  deploy-frontend-production:
    name: Deploy Frontend -> Production (Hostinger)
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.build-frontend.result == 'success'
    environment: production # <- HUMAN GATE: pauses, emails reviewer, waits for approval
    steps:
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: dist }
      - name: FTP deploy to Hostinger production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          local-dir: dist/
          server-dir: /public_html/
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: "FinTrack Release ${{ github.run_number }}"
          draft: false
          prerelease: false
